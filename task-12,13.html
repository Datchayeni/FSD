<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration Form</title>

        <style>
            body{
                background-color: blanchedalmond;
                font-family: 'Times New Roman', Times, serif;
                margin:0;
            }

            #container{
                width:80%;
                margin:auto;
                padding:20px;
                border-radius:10px;
                box-shadow:0 0 10px gray;
            }

            .form{
                background:white;
                width:350px;
                margin:auto;
                padding:20px;
                border-radius:10px;
            }

            label{
                display:block;
                margin-top:10px;
                font-weight:bold;
            }

            input,select{
                width:100%;
                padding:8px;
                margin:8px 0 15px;
                box-sizing:border-box;
            }

            button{
                width:100%;
                padding:10px;
                background:green;
                color:white;
                border:none;
                border-radius:5px;
                cursor:pointer;
            }

            button:hover{
                background:darkgreen;
            }
        </style>
    </head>
    <body>
        <h2 style="text-align: center;">Student Details Registration Form</h2>
        <div id="container">
            <form>
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name">

                <label>Email Id</label>
                <input type="email" id="email" placeholder="Enter your mail">

                <label>Course</label>
                <select id="course">
                    <option value="">Select Course</option>
                    <option>B.Sc Computer Science with AI</option>
                    <option>B.Sc Data Science with AI</option>
                    <option>B.Sc Computer Science with Cloud Computing</option>
                    <option>B.Com FinTech and AI</option>
                    <option>B.com Banking and FinTech</option>
                    <option>BBA Airline and Airport Management</option>
                    <option>BBA Digital Marketing and Business Analysis</option>
                    <option>BBA Fashion Management</option>
                </select>

                <label>Shift</label>
                <select id="shift">
                    <option value="">Select Shift</option>
                    <option>Shift-1</option>
                    <option>Shift-2</option>
                </select>

                <button type="button" onclick="showAlert()">Submit</button>
            </form>
        </div>

        <script>
            function showAlert() {
                alert("Student Registration Submitted Successfully!");
            }
        </script>
    </body>
</html>
